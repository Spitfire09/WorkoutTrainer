name: Changelog guard

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  require-changelog-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require CHANGELOG update for app changes
        run: |
          set -euo pipefail

          EVENT_NAME="${{ github.event_name }}"
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
            if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
              CHANGED_FILES="$(git show --pretty='' --name-only "$HEAD_SHA")"
            else
              CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
            fi
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          APP_CHANGED=0
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            if [[ "$file" =~ ^assets/ ]] || [[ "$file" == "index.html" ]] || [[ "$file" == "sw.js" ]] || [[ "$file" == "manifest.json" ]] || [[ "$file" =~ ^GoogleSheet/ ]]; then
              APP_CHANGED=1
              break
            fi
          done <<< "$CHANGED_FILES"

          if [[ "$APP_CHANGED" -eq 0 ]]; then
            echo "No app files changed. Skipping changelog requirement."
            exit 0
          fi

          if echo "$CHANGED_FILES" | grep -qx "CHANGELOG.json"; then
            echo "CHANGELOG.json updated."
            exit 0
          fi

          echo "::error::App files changed, but CHANGELOG.json was not updated."
          exit 1
