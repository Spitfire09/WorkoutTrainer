name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update service worker cache version
        run: |
          if [ ! -f sw.js ]; then
            echo "Error: sw.js not found" && exit 1
          fi
          SHORT_SHA=$(git rev-parse --short HEAD)
          sed -i "s/const CACHE = '[^']*'/const CACHE = 'workouttracker-${SHORT_SHA}'/" sw.js
          if ! grep -q "workouttracker-${SHORT_SHA}" sw.js; then
            echo "Error: cache version replacement failed in sw.js" && exit 1
          fi
          echo "Cache version set to: workouttracker-${SHORT_SHA}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
